<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="create account.css">
    <title>Music Match login</title>
</head>



<body>
    
<form autocomplete="off" class="form" action="/register" method="POST">
    <p class="title">Register</p>
    <p class="message">Signup now and get full 
        access to our app.</p>
        <div class="form-group">
            <label>
                <input type="text" name ="firstname" required>
                <span>Firstname</span>
            </label>

            <label>
                <input type="text" name ="lastname" required>
                <span>Lastname</span>
            </label>
        </div>
            <label>
                <input type="text" name ="email" required>
                <span>Email</span>
            </label>
            <label>
                <input type="text" name ="password" required>
                <span>Password</span>
                <span class="icon" id="togglePassword">
                    <i class="far fa-eye-slash"></i>
                </span>
            </label>
            <button class="sumbit">Submit</button>
            <p class="signin">
                Already have an account?
                <a href="#" id="sign-in">sign-in</a>
                
            </p>
        


        <script src="index.js" defer></script>
</body>
</html>
