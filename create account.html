<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Match login</title>
</head>



<body>
    
<form autocomplete="off" class="form" action="/register" method="POST">
    <p class="title">Register</p>
    <p class="message">Signup now and get full 
        access to our app.</p>
        <div class="form-group">
            <label>
                <input type="text" name ="firstname" required>
                <span>Firstname</span>
            </label>

            <label>
                <input type="text" name ="lastname" required>
                <span>Lastname</span>
            </label>
            <label>
                <input type="text" name ="email" required>
                <span>Email</span>
            </label>
            <label>
                <input type="text" name ="password" required>
                <span>Password</span>
                <span class="icon" id="togglePassword">
                    <i class="far fa-eye-slash"></i>
                </span>
            </label>

            <label>
                <input type="text" name="repassword" required>
                <span>Re-Password</span>
                <span class="icon" id="togglePassword">
                    <i class="far fa-eye-slash"></i>
                </span>
            </label>
            <button type="submit" class="submit">Submit</button>
            <a href="/login">Sign-in</a>>
        </div>


        <script src="index.js" defer></script>
</body>
</html>
