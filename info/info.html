<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Profile</title>
  <link rel="stylesheet" href="info.css">
</head>
<body>

  <div class="header">
    <h1>Create Profile</h1>
  </div>

  <form id="form">
    <label for="name">Name / Username</label>
    <input type="text" id="name" placeholder="Enter your name" required>

    <label for="age">Age</label>
    <input type="number" id="age" placeholder="Enter your age" required>

    <label for="gender">Gender & Preferences</label>
    <select id="gender" required>
      <option value="">Select gender & preference</option>
      <option>Male</option>
      <option>Female</option>
      <option>Non-binary</option>
      <option>Prefer not to say</option>
    </select>

    <label for="city">City</label>
    <input type="text" id="city" placeholder="Enter your city">

    <label for="height">Height</label>
    <input type="text" id="height" placeholder="Enter your height">

    <label for="bio">Short Bio (max 100 characters)</label>
    <textarea id="bio" placeholder="Tell us about yourself" maxlength="100"></textarea>
    <p id="bioCount">0 / 100</p>

    <label>Top 3 Music Genres</label>
    <input type="text" id="genre1" placeholder="Genre 1">
    <input type="text" id="genre2" placeholder="Genre 2">
    <input type="text" id="genre3" placeholder="Genre 3">

    <button type="submit">Submit</button>

    <p id="result"></p>
  </form>

  <script src="info.js"></script>
</body>
</html>
