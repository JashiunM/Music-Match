<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Profile</title>
  <link rel="stylesheet" href="info.css">
</head>
<body>

  <div class="header">
    <h1>Create Profile</h1>
  </div>

  <form id="form">
    <!-- Scrollable Avatar Picker -->
    <label>Profile Picture</label>
    <div class="profile-picker">
      <img id="picPreview" src="https://cdn.pixabay.com/photo/2019/08/11/18/59/avatar-4399701_960_720.png" alt="Profile Picture">
      <div id="picOptions" class="pic-options scrollable">
        <!-- 20 unique avatars -->
        <img src="https://cdn.pixabay.com/photo/2019/08/11/18/59/avatar-4399701_960_720.png" alt="Avatar 1">
        <img src="https://cdn.pixabay.com/photo/2021/01/11/12/42/avatar-5901815_960_720.png" alt="Avatar 2">
        <img src="https://cdn.pixabay.com/photo/2020/07/01/12/58/avatar-5353706_960_720.png" alt="Avatar 3">
        <img src="https://cdn.pixabay.com/photo/2016/04/01/10/58/avatar-1295396_960_720.png" alt="Avatar 4">
        <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/avatar-2025556_960_720.png" alt="Avatar 5">
        <img src="https://cdn.pixabay.com/photo/2017/03/03/12/01/avatar-2110767_960_720.png" alt="Avatar 6">
        <img src="https://cdn.pixabay.com/photo/2017/02/23/13/05/avatar-2098035_960_720.png" alt="Avatar 7">
        <img src="https://cdn.pixabay.com/photo/2018/01/15/07/51/avatar-3082903_960_720.png" alt="Avatar 8">
        <img src="https://cdn.pixabay.com/photo/2017/01/31/13/15/avatar-2025558_960_720.png" alt="Avatar 9">
        <img src="https://cdn.pixabay.com/photo/2017/01/31/13/15/avatar-2025559_960_720.png" alt="Avatar 10">
        <img src="https://cdn.pixabay.com/photo/2016/11/18/19/10/avatar-1835488_960_720.png" alt="Avatar 11">
        <img src="https://cdn.pixabay.com/photo/2017/01/31/13/13/avatar-2025555_960_720.png" alt="Avatar 12">
        <img src="https://cdn.pixabay.com/photo/2016/11/18/19/10/avatar-1835490_960_720.png" alt="Avatar 13">
        <img src="https://cdn.pixabay.com/photo/2016/11/18/19/09/avatar-1835486_960_720.png" alt="Avatar 14">
        <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/avatar-2025557_960_720.png" alt="Avatar 15">
        <img src="https://cdn.pixabay.com/photo/2017/03/03/12/01/avatar-2110768_960_720.png" alt="Avatar 16">
        <img src="https://cdn.pixabay.com/photo/2017/02/23/13/05/avatar-2098036_960_720.png" alt="Avatar 17">
        <img src="https://cdn.pixabay.com/photo/2018/01/15/07/51/avatar-3082904_960_720.png" alt="Avatar 18">
        <img src="https://cdn.pixabay.com/photo/2017/01/31/13/15/avatar-2025560_960_720.png" alt="Avatar 19">
        <img src="https://cdn.pixabay.com/photo/2017/01/31/13/15/avatar-2025561_960_720.png" alt="Avatar 20">
      </div>
    </div>

    <label for="name">Name / Username</label>
    <input type="text" id="name" placeholder="Enter your name" required>

    <label for="age">Age</label>
    <input type="number" id="age" placeholder="Enter your age" required>

    <label for="gender">Gender & Preferences</label>
    <select id="gender" required>
      <option value="">Select gender & preference</option>
      <option>Male</option>
      <option>Female</option>
      <option>Non-binary</option>
      <option>Prefer not to say</option>
    </select>

    <label for="city">City</label>
    <input type="text" id="city" placeholder="Enter your city">

    <label for="height">Height</label>
    <input type="text" id="height" placeholder="Enter your height">

    <label for="bio">Short Bio (max 100 characters)</label>
    <textarea id="bio" placeholder="Tell us about yourself" maxlength="100"></textarea>
    <p id="bioCount">0 / 100</p>

    <label>Top 3 Music Genres</label>
    <input type="text" id="genre1" placeholder="Genre 1">
    <input type="text" id="genre2" placeholder="Genre 2">
    <input type="text" id="genre3" placeholder="Genre 3">

    <button type="submit">Submit</button>
    <p id="result"></p>
  </form>

  <script src="info.js"></script>
</body>
</html>
