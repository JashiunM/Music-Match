<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Profile</title>
  <link rel="stylesheet" href="/info/info.css">
</head>
<body>

  <div class="header">
    <h1>Create Profile</h1>
  </div>

  <form id="form">
    <!-- Scrollable Avatar Picker -->
    <label>Profile Picture</label>
    <div class="profile-picker">
      <img id="picPreview" src="https://cdn.pixabay.com/photo/2019/08/11/18/59/avatar-4399701_960_720.png" alt="Profile Picture">
      <div id="picOptions" class="pic-options scrollable">
        <!-- 20 unique avatars -->
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Alex alt="Avatar 1">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=mark alt="Avatar 2">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Taylors alt="Avatar 3">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Jack alt="Avatar 4">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Case alt="Avatar 5">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=de alt="Avatar 6">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Maggie alt="Avatar 7">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Alexdcsd alt="Avatar 8">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=ben alt="Avatar 9">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Taylor alt="Avatar 10">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=king alt="Avatar 11">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Casey alt="Avatar 12">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=jordan alt="Avatar 13">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Morgan alt="Avatar 14">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Jay alt="Avatar 15">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Jamie alt="Avatar 16">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=Taylor alt="Avatar 17">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=moore alt="Avatar 18">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=love alt="Avatar 19">
        <img src=https://api.dicebear.com/7.x/adventurer/svg?seed=carly alt="Avatar 20">
      </div>
    </div>

    <label for="name">Username</label>
    <input type="text" id="name" placeholder="Enter your name" required>

    <label for="age">Age</label>
    <input type="number" id="age" placeholder="Enter your age" required>

    <label for="gender">Gender & Preferences</label>
    <select id="gender" required>
      <option value="">Select gender & preference</option>
      <option>Male</option>
      <option>Female</option>
      <option>Non-binary</option>
      <option>Prefer not to say</option>
    </select>

    <label for="city">City</label>
    <input type="text" id="city" placeholder="Enter your city">

    <label for="height">Height</label>
    <input type="text" id="height" placeholder="Enter your height">

    <label for="bio">Short Bio (max 100 characters)</label>
    <textarea id="bio" placeholder="Tell us about yourself" maxlength="100"></textarea>
    <p id="bioCount">0 / 100</p>

    <label>Top 3 Music Genres</label>
<select id="genre1">
  <option value="">Select Genre 1</option>
</select>
<select id="genre2">
  <option value="">Select Genre 2</option>
</select>
<select id="genre3">
  <option value="">Select Genre 3</option>
</select>

    <button type="submit">Submit</button>
    <p id="result"></p>
  </form>

  <script src="/info/info.js"></script>
</body>
</html>
