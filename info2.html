<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Match - Find Your Musical Soulmate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎵 Music Match</h1>
      <p>Find your perfect match through the power of music</p>
    </header>

    <div class="main-content">
      <form id="profileForm">
        <h2>Create Your Profile</h2>

        <div class="form-section">
          <h3>Basic Information</h3>
          <input type="text" id="name" placeholder="Name / Username" required>
          <input type="number" id="age" placeholder="Age" min="18" max="100" required>
          <select id="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="non-binary">Non-binary</option>
            <option value="prefer-not-to-say">Prefer not to say</option>
          </select>
          <select id="preference" required>
            <option value="">Interested in</option>
            <option value="male">Men</option>
            <option value="female">Women</option>
            <option value="everyone">Everyone</option>
          </select>
          <input type="text" id="city" placeholder="City" required>
          <input type="text" id="height" placeholder="Height (e.g., 5'8&quot;)">
          <textarea id="bio" placeholder="Tell us about yourself..." maxlength="500"></textarea>
        </div>

        <button type="submit" class="submit-btn">Create Profile & Find Matches</button>
      </form>

      <div id="matches" class="matches-section" style="display: none;">
        <h2>Your Music Matches</h2>
        <div id="matchesList" class="matches-list">
          <!-- Matches will be displayed here -->
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
