<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+US+Modern:wght@100..400&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Match</title>
    <link rel="stylesheet" href="/FrontEnd/homestyle.css">
</head>
<body>
    <header>
        <h1 class="logo">
            <img src="Final-Logo.png" alt="Logo">
            Music Match
        </h1>
        <button class="user-button">
        <img id="profile-icon" class="profile-icon" src="Assets/default-profile.png">
        </button>
    </header>

    <div class="layout">
        <aside class="left">
            <h2>Top 5 Artists</h2>
            <h3> Taylor Swift </h3>
            <h3> Bad Bunny </h3>
            <h3> The Weeknd </h3>
            <h3> Drake </h3>
            <h3> Bruno Mars </h3>
        </aside>

        <main class="center">
            <img src="NewHeart.png" alt="Logo">
            <button id="start-button" class="start-button">Find Music Match</button>
            <h2> The best relationships start with the right song 🎵</h2>
        </main>

        <aside class="right">
            <h2>Top 5 Songs</h2>
            <h3> Choosin' Texas </h3>
            <h3> FATHER </h3>
            <h3> Risk It All</h3>
            <h3> E85 </h3>
            <h3> Man I Need </h3>
        </aside>
    </div>
     <script src="/FrontEnd/match.js"></script>
</body>
</html>
