<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playwrite+US+Modern:wght@100..400&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Couple Matching</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: "Playwrite US Modern", cursive;
      margin: 0;
      background: linear-gradient(135deg, #ff9a9e, #ff99cc);
      color: #333;
    }
    .match-section {
      text-align: center;
      margin-top: 1rem;
      margin-bottom: 2rem;
      color: white;
    }

    .match-section h2 {
      font-size: 2rem;
      margin: 0.5rem 0;
    }

    .match-section p {
      font-size: 1.2rem;
      opacity: 0.9;
    }
    header {
      text-align: center;
      padding: 2.5rem 1rem;
      color: white;
    }

    h1 {
      margin: 0;
      font-size: 2.8rem;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
      padding: 2rem;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      padding: 1.5rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ff6f91;
      margin-bottom: 0.5rem;
    }

    .card h2 {
      margin: 0.5rem 0;
    }

    .card p {
      font-size: 0.9rem;
      opacity: 0.8;
      margin: 0.4rem 0;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: white;
      margin-top: 2rem;
      opacity: 0.8;
    }
    #song-list {
      max-width: 500px;
      margin: 2rem auto; /* The 'auto' centers the block horizontally */
      padding: 2rem;
      display: none; /* Hidden by default until button is clicked */
    }

    /* When the card has content, we show it */
    #song-list.card {
      display: block;
    }

    .playlist-card ol {
      color: #333;
      font-family: inherit;
    }

    .playlist-card li::marker {
      color: #ff6f91;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h1>💖 Your Music Match 💖</h1><br>
  <div class="match-section">
    <h2 id="match-percent">Match Score: --</h2>
    <p id="match-message"></p>
  </div>
</header>

<div class="container">

  <div class="card">
    <img id="user-img" alt="Your Profile">
    <h2 id="user-name">You</h2>
    <p id="user-age"></p>
    <p id="user-city"></p>
    <p id="user-bio"></p>
    <p id="user-genres"></p>
  </div>

  <div class="card">
    <img id="profile-img" alt="Profile Picture">
    <h2 id="profile-name">Loading...</h2>
    <p id="profile-age"></p>
    <p id="profile-city"></p>
    <p id="profile-bio"></p>
    <p id="match-genres"></p>
  </div>


</div>

<div id="playlist-container" style="text-align: center; margin-top: 20px;">
    </div>

<div id="song-list" style="max-width: 600px; margin: 20px auto; color: white;">
    </div>

<footer>
  
</footer>

<script src="match.js"></script>

</body>
</html>
