<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Couple Matching</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #333;
    }

    header {
      text-align: center;
      padding: 2.5rem 1rem;
      color: white;
    }

    h1 {
      margin: 0;
      font-size: 2.8rem;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
      padding: 2rem;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      padding: 1.5rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ff6f91;
      margin-bottom: 0.5rem;
    }

    .card h2 {
      margin: 0.5rem 0;
    }

    .card p {
      font-size: 0.9rem;
      opacity: 0.7;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: white;
      margin-top: 2rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<header>
  <h1>💖 Couple Matcher 💖</h1>
  <p>Find your perfect match</p>
</header>

<div class="container">
  <div class="card">
    <img class="profile">
    <h2>Alex</h2>
    <p>Loves music & traveling</p>
  </div>

  <div class="card">
    <img class="profile">
    <h2>Jordan</h2>
    <p>Enjoys coding & gaming</p>
  </div>
</div>

<footer>
  <p>© 2026 Couple Matching App</p>
</footer>

<script>
  const cuteImages = [
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Alex",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Jordan",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Taylor",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Riley",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Sam",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Jamie",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Chris",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Morgan",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Casey",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Drew",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Quinn",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Avery",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Skyler",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Reese",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Emerson",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Blake",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Rowan",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Kai",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=Phoenix",
    "https://api.dicebear.com/7.x/adventurer/svg?seed=River"
  ];


  const profiles = document.querySelectorAll('.profile');

  profiles.forEach(img => {
    const random = Math.floor(Math.random() * cuteImages.length);
    img.src = cuteImages[random];
  });
</script>

</body>
</html>
